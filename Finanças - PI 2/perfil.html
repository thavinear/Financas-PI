<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil da Empresa | Finanças+</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <div class="profile-container">
        <section class="profile-header">
            <div class="company-logo">
                <span class="logo-icon">F+</span>
            </div>
            <div class="company-intro">
                <h1>Finanças+ Soluções LTDA</h1>
                <p>CNPJ: 00.000.000/0001-00 • Desde 2024</p>
                <span class="status-badge">Ativa</span>
            </div>
        </section>

        <div class="profile-content">
            <section class="info-section">
                <h3>Dados de Contato</h3>
                <div class="info-card">
                    <p><strong>E-mail:</strong> contato@financasplus.com</p>
                    <p><strong>Telefone:</strong> (11) 98765-4321</p>
                    <p><strong>Endereço:</strong> Av. Paulista, 1000 - SP</p>
                </div>
            </section>

            <section class="info-section">
                <h3>Resumo Financeiro</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span>Faturamento Anual</span>
                        <p class="stat-value">R$ 1.2M</p>
                    </div>
                    <div class="stat-item">
                        <span>Colaboradores</span>
                        <p class="stat-value">24</p>
                    </div>
                </div>
            </section>
        </div>

        <footer class="profile-actions">
            <button class="btn-edit">Editar Perfil</button>
            <button class="btn-export">Exportar Relatório</button>
        </footer>
    </div>
</body>
</html>
