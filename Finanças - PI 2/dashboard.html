<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Finanças — Dashboard</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
    <aside id="sidebar-target"></aside>

    <main class="main" style="flex: 1; padding: 36px 40px;">
        <div class="top-bar">
            <div>
                <h1 class="page-title">Dashboard</h1>
                <p class="page-sub">Resumo financeiro do período</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="theme-toggle" class="btn-theme">Alternar Tema</button>
                <select class="month-select" id="month-picker">
                    <option value="abril">Abril 2025</option>
                    <option value="marco">Março 2025</option>
                </select>
            </div>
        </div>

        </main>

    <script type="module">
        import { initTheme } from './js/utils/storage.js';
        import { initDashboard } from './js/controllers/financeController.js';

        // Carregar Sidebar e Iniciar Scripts
        fetch('./components/sidebar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('sidebar-target').innerHTML = html;
                initTheme();
                initDashboard();
            });
    </script>
</body>
</html>
