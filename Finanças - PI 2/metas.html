<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metas | Controle de Finanças</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="page-header">
            <div>
                <h1>Metas Corporativas</h1>
                <p>Acompanhamento do planejamento anual 2026</p>
            </div>
            <button class="btn-new-goal">+ Nova Meta</button>
        </header>

        <section class="goals-grid">
            <div class="goal-card">
                <div class="goal-info">
                    <span class="badge" style="background: var(--green);">Concluída</span>
                    <h3>Redução de Custos Fixos</h3>
                    <p>Meta: R$ 50.000,00</p>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" style="width: 100%; background: var(--green);"></div>
                </div>
                <div class="goal-footer">
                    <span>100% atingido</span>
                </div>
            </div>

            <div class="goal-card">
                <div class="goal-info">
                    <span class="badge" style="background: var(--blue);">Em andamento</span>
                    <h3>Faturamento Semestral</h3>
                    <p>Meta: R$ 200.000,00</p>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" style="width: 65%; background: var(--blue);"></div>
                </div>
                <div class="goal-footer">
                    <span>65% (R$ 130.000,00)</span>
                </div>
            </div>

            <div class="goal-card">
                <div class="goal-info">
                    <span class="badge" style="background: var(--amber);">Atenção</span>
                    <h3>Expansão de Equipe</h3>
                    <p>Meta: 10 contratações</p>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" style="width: 30%; background: var(--amber);"></div>
                </div>
                <div class="goal-footer">
                    <span>3 de 10 vagas</span>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
